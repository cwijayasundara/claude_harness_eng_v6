services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.117.0
    container_name: harness-otel-collector
    command: ["--config=/etc/otel/config.yml"]
    volumes:
      - ./telemetry/otel-collector-config.yml:/etc/otel/config.yml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8889:8889"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.2.1
    container_name: harness-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-admin-api"
      - "--storage.tsdb.retention.time=90d"
    volumes:
      - ./telemetry/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - otel-collector
      - pushgateway
    restart: unless-stopped

  pushgateway:
    image: prom/pushgateway:v1.11.0
    container_name: harness-pushgateway
    ports:
      - "9091:9091"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.6.0
    container_name: harness-grafana
    volumes:
      - ./telemetry/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./telemetry/grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=harness
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:
