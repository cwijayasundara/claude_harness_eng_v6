# Project Zero secret scan allowlist.
# Baseline regex still runs in pre-commit; gitleaks is the enhanced CI tier.

title = "claude-harness-eng-v5"

[extend]
useDefault = true

[allowlist]
description = "Harness fixtures, local env files (gitignored), and templates"
paths = [
  '''test/evals/fixtures/''',
  '''test/fixtures/''',
  '''test/e2e/fixtures/''',
  '''\.claude/templates/''',
  '''docs/internal/''',
  # Local secrets must never be committed; git-mode CI already ignores them.
  # Allowlist keeps filesystem-mode local scans from failing on a developer's .env.
  '''(^|/)\.env$''',
  '''(^|/)\.env\..+$''',
]
