name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install tree-sitter wheels for the AST code indexer
        # Pinned to the versions the suite is validated against locally; prebuilt
        # cp312 wheels (no compiler). Without these, the code-index AST tests fail
        # with ModuleNotFoundError: No module named 'tree_sitter'.
        run: >-
          python -m pip install
          tree-sitter==0.25.2
          tree-sitter-javascript==0.25.0
          tree-sitter-typescript==0.23.2
          tree-sitter-java==0.23.5
          tree-sitter-c-sharp==0.23.5
          tree-sitter-go==0.25.0
      - name: Unit tests (plugin/skill/hook schema, eval task specs + runner orchestration)
        run: npm test

  evals:
    # Behavioral evals drive a real model and so are gated on the ANTHROPIC_API_KEY
    # secret. The runner skips cleanly (exit 0) when the key is absent, so this job
    # is a no-op on forks and PRs without the secret — it never blocks a merge. The
    # deterministic parts (task-spec validation + runner orchestration) always run
    # in the `test` job above.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Behavioral golden evals (model-gated)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npm run test:evals
