global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Prompt-cache recording rules + alerts. Mounted alongside this file in the
# Prometheus config dir. See telemetry/CACHE_MONITORING.md.
rule_files:
  - cache-alerts.rules.yml

scrape_configs:
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]

  - job_name: harness-pushgateway
    honor_labels: true
    static_configs:
      - targets: ["pushgateway:9091"]
