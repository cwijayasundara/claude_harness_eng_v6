<script>
(function(){
"use strict";
var MODEL = JSON.parse(document.getElementById("graph-data").textContent);

function cssVar(n){ return getComputedStyle(document.documentElement).getPropertyValue(n).trim(); }

var selected=-1, depth=1, activeLangs=null;

document.getElementById("metrics").innerHTML =
  chip(S.files,"files")+chip(S.internalEdges,"internal links")+chip(S.externalImports,"ext imports")+chip(S.cycles,"cycles",S.cycles>0);

var langs = Object.keys(MODEL.languages).sort(), lf=document.getElementById("langfilter");
langs.forEach(function(l){
  var b=document.createElement("button"); b.className="lf"; b.setAttribute("aria-pressed","false");
  b.innerHTML='<span class="dot" style="background:'+langVar(l)+'"></span>'+esc(l)+' <span class="tnum">'+MODEL.languages[l]+'</span>';
  b.onclick=function(){ toggleLang(l,b); }; lf.appendChild(b);
});
function toggleLang(l){
  if(!activeLangs) activeLangs=new Set(langs);
  if(activeLangs.has(l)) activeLangs.delete(l); else activeLangs.add(l);
  if(activeLangs.size===langs.length) activeLangs=null;
  Array.prototype.forEach.call(lf.children,function(btn,i){ btn.setAttribute("aria-pressed",(activeLangs&&activeLangs.has(langs[i]))?"true":"false"); });
  renderList();
}

var order = N.map(function(_,i){return i;}).sort(function(a,b){ return N[b].fin-N[a].fin || N[b].fout-N[a].fout || N[a].p.localeCompare(N[b].p); });
var listEl=document.getElementById("nodelist"), searchEl=document.getElementById("search");
searchEl.addEventListener("input", renderList);

  if(N[i].p.toLowerCase().indexOf(q)>=0) return true;
  var s=N[i].sym; for(var j=0;j<s.length;j++){ if((s[j].n||"").toLowerCase().indexOf(q)>=0) return true; } return false;
}
function visibleFile(i,q){ return !(activeLangs && !activeLangs.has(N[i].l)) && !(q && !matchQuery(i,q)); }

// directory tree built from file paths — mirrors the real source layout
var tree=(function(){
  var root={name:"",path:"",dirs:{},files:[]};
  N.forEach(function(n,i){
    var parts=n.p.split("/"), node=root;
    for(var d=0; d<parts.length-1; d++){
      var seg=parts[d], np=(node.path?node.path+"/":"")+seg;
      if(!node.dirs[seg]) node.dirs[seg]={name:seg,path:np,dirs:{},files:[]};
      node=node.dirs[seg];
    }
    node.files.push(i);
  });
  return root;
})();
var collapsed=new Set();
(function seed(node){ Object.keys(node.dirs).forEach(function(k){ collapsed.add(node.dirs[k].path); seed(node.dirs[k]); }); })(tree);

var viewMode="tree";
document.getElementById("modeTree").onclick=function(){ setMode("tree"); };
document.getElementById("modeRank").onclick=function(){ setMode("rank"); };
function setMode(m){ viewMode=m;
  document.getElementById("modeTree").setAttribute("aria-pressed",m==="tree"?"true":"false");
  document.getElementById("modeRank").setAttribute("aria-pressed",m==="rank"?"true":"false");
  renderList();
}

function fileRow(i,depth){
  var n=N[i], b=document.createElement("button");
  b.className="node-row"; b.setAttribute("role","treeitem"); b.setAttribute("aria-selected",i===selected?"true":"false");
  if(viewMode==="tree") b.style.paddingLeft=(12+depth*15)+"px";
  b.innerHTML='<span class="dot" style="background:'+langVar(n.l)+'"></span>'+
    '<span class="path"><span class="base">'+esc(basename(n.p))+'</span>'+(viewMode==="tree"?'':'<span class="dir">'+esc(dirname(n.p)||"·")+'</span>')+'</span>'+
    (n.hub?'<span class="star" title="hub">&#9733;</span>':'')+
    '<span class="badges"><span class="b in" title="fan-in">&larr;'+n.fin+'</span><span class="b" title="fan-out">'+n.fout+'&rarr;</span></span>';
  b.onclick=function(){ select(i,true); }; return b;
}
function folderRow(node,depth,count){
  var b=document.createElement("button"), open=!collapsed.has(node.path);
  b.className="tree-row"; b.style.paddingLeft=(12+depth*15)+"px"; b.setAttribute("aria-expanded",open?"true":"false");
  b.innerHTML='<span class="caret">'+(open?"&#9662;":"&#9656;")+'</span><span class="folder">'+esc(node.name)+'/</span><span class="fcount tnum">'+count+'</span>';
  b.onclick=function(){ if(collapsed.has(node.path)) collapsed.delete(node.path); else collapsed.add(node.path); renderList(); };
  return b;
}
function countVisible(node,q){
  var c=0; node.files.forEach(function(i){ if(visibleFile(i,q)) c++; });
  Object.keys(node.dirs).forEach(function(k){ c+=countVisible(node.dirs[k],q); });
  return c;
}
function renderTreeNode(node,depth,q,frag){
  Object.keys(node.dirs).sort().forEach(function(k){
    var child=node.dirs[k], vc=countVisible(child,q);
    if(vc===0) return;
    frag.appendChild(folderRow(child,depth,vc));
    if(q || !collapsed.has(child.path)) renderTreeNode(child,depth+1,q,frag); // a search auto-expands matching branches
  });
  node.files.slice().sort(function(a,b){return N[a].p.localeCompare(N[b].p);}).forEach(function(i){
    if(visibleFile(i,q)) frag.appendChild(fileRow(i,depth));
  });
}

  var q=searchEl.value.trim().toLowerCase(), frag=document.createDocumentFragment(), shown;
  if(viewMode==="rank"){
    shown=0; order.forEach(function(i){ if(visibleFile(i,q)){ shown++; frag.appendChild(fileRow(i,0)); } });
  } else {
    shown=countVisible(tree,q); renderTreeNode(tree,0,q,frag);
  }
  listEl.innerHTML=""; listEl.appendChild(frag);
  document.getElementById("filecount").textContent = shown+" / "+N.length;
}

var insp=document.getElementById("inspector");
function linkSection(title,idxs){
  var uniq=[], seen={}; idxs.forEach(function(i){ if(!seen[i]){seen[i]=1;uniq.push(i);} });
  uniq.sort(function(a,b){return N[b].fin-N[a].fin || N[a].p.localeCompare(N[b].p);});
  var h='<div class="sec"><h3>'+title+' <span class="n tnum">'+uniq.length+'</span></h3>';
  if(!uniq.length) return h+'<span class="muted">None.</span></div>';
  uniq.forEach(function(i){
    h+='<button class="link" data-i="'+i+'"><span class="dot" style="background:'+langVar(N[i].l)+'"></span>'+
      '<span class="path" title="'+esc(N[i].p)+'">'+esc(N[i].p)+'</span><span class="b in">&larr;'+N[i].fin+'</span></button>';
  });
  return h+'</div>';
}
function renderInspector(){
  if(selected<0){ insp.innerHTML='<div class="insp-empty">No file selected.</div>'; return; }
  var n=N[selected];
  var html='<div class="insp-head"><div class="lang"><span class="dot" style="background:'+langVar(n.l)+'"></span>'+esc(n.l)+' · '+n.loc+' LOC</div>'+
    '<div class="file"><span class="dir">'+esc(dirname(n.p))+'</span>'+esc(basename(n.p))+'</div></div>';
  html+='<div class="stat-row"><div class="stat in"><b class="tnum">'+n.fin+'</b><span>imported by</span></div>'+
    '<div class="stat"><b class="tnum">'+n.fout+'</b><span>imports</span></div>'+
    '<div class="stat'+(n.hub?' hub':'')+'"><b class="tnum">'+n.sym.length+'</b><span>symbols</span></div></div>';
  html+='<div class="sec"><h3>Symbols <span class="n tnum">'+n.sym.length+(n.symOverflow?'+':'')+'</span></h3>';
  if(n.sym.length){
    n.sym.forEach(function(s){
      html+='<span class="sym"><span class="ln">L'+s.s+(s.e&&s.e!==s.s?'-'+s.e:'')+'</span>'+(s.k?'<span class="kind">'+esc(s.k)+' </span>':'')+esc(s.g||s.n)+'</span>';
    });
    if(n.symOverflow) html+='<div class="overflow">+ '+n.symOverflow+' more (capped)</div>';
  } else { html+='<span class="muted">No extracted symbols.</span>'; }
  html+='</div>';
  html+=linkSection("Imported by", inAdj[selected].map(function(x){return x.t;}));
  html+=linkSection("Imports (internal)", outAdj[selected].map(function(x){return x.t;}));
  html+='<div class="sec"><h3>External deps <span class="n tnum">'+n.ext.length+(n.extOverflow?'+':'')+'</span></h3>';
  if(n.ext.length){
    html+='<div class="extlist">'+n.ext.map(function(x){return '<span class="ext">'+esc(x)+'</span>';}).join("")+'</div>';
    if(n.extOverflow) html+='<div class="overflow">+ '+n.extOverflow+' more (capped)</div>';
  } else { html+='<span class="muted">None.</span>'; }
  html+='</div>';
  insp.innerHTML=html;
  Array.prototype.forEach.call(insp.querySelectorAll(".link"),function(el){ el.onclick=function(){ select(+el.dataset.i,true); }; });
}

var canvas=document.getElementById("canvas"), ctx=canvas.getContext("2d");
var stage=document.getElementById("stage"), tooltip=document.getElementById("tooltip");
var view={x:0,y:0,scale:1}, sim=null, dragNode=null, panning=false, last={x:0,y:0}, hoverNode=null;
var DPR=Math.max(1,Math.min(2,window.devicePixelRatio||1));
function resize(){ var r=stage.getBoundingClientRect(); canvas.width=r.width*DPR; canvas.height=r.height*DPR; canvas.style.width=r.width+"px"; canvas.style.height=r.height+"px"; draw(); }
window.addEventListener("resize",resize);
function neighborhood(root,d){
  var ids={}, order=[root]; ids[root]=0; var frontier=[root];

    var next=[];
    frontier.forEach(function(i){ outAdj[i].concat(inAdj[i]).forEach(function(x){ if(ids[x.t]===undefined){ ids[x.t]=step+1; order.push(x.t); next.push(x.t); } }); });
    frontier=next;
  }
  var links=[]; E.forEach(function(e){ if(ids[e[0]]!==undefined && ids[e[1]]!==undefined) links.push({s:e[0],t:e[1],k:e[2]}); });
  return {ids:ids, order:order, links:links};
}
function buildSim(root){
  var nb=neighborhood(root,depth), r=stage.getBoundingClientRect(), cx=r.width/2, cy=r.height/2, nodes={};
  nb.order.forEach(function(i,idx){ var ang=idx*2.399963, rad=idx===0?0:40+nb.ids[i]*70; nodes[i]={i:i,x:cx+Math.cos(ang)*rad,y:cy+Math.sin(ang)*rad,vx:0,vy:0,pinned:idx===0}; });
  nodes[root].x=cx; nodes[root].y=cy; view={x:0,y:0,scale:1};
  sim={root:root, nb:nb, nodes:nodes, alpha:1};
  if(reduceMotion){ for(var t=0;t<220;t++) tick(); sim.alpha=0; }
  fitView();
}
function tick(){
  if(!sim) return;
  var ns=sim.nodes, keys=Object.keys(ns), r=stage.getBoundingClientRect(), cx=r.width/2, cy=r.height/2, a=sim.alpha;
  for(var i=0;i<keys.length;i++){
    var A=ns[keys[i]];
    for(var j=i+1;j<keys.length;j++){
      var B=ns[keys[j]], dx=A.x-B.x, dy=A.y-B.y, d2=dx*dx+dy*dy+0.01, d=Math.sqrt(d2), f=2600/d2, fx=dx/d*f, fy=dy/d*f;
      A.vx+=fx; A.vy+=fy; B.vx-=fx; B.vy-=fy;
    }
    A.vx+=(cx-A.x)*0.006; A.vy+=(cy-A.y)*0.006;
  }
  sim.nb.links.forEach(function(l){
    var A=ns[l.s], B=ns[l.t]; if(!A||!B) return;
    var dx=B.x-A.x, dy=B.y-A.y, d=Math.sqrt(dx*dx+dy*dy)||1, k=(d-96)*0.02, fx=dx/d*k, fy=dy/d*k;
    A.vx+=fx; A.vy+=fy; B.vx-=fx; B.vy-=fy;
  });
  keys.forEach(function(k){ var A=ns[k]; if(A.pinned||A===dragNode){A.vx=0;A.vy=0;return;} A.vx*=0.82; A.vy*=0.82; A.x+=A.vx*a; A.y+=A.vy*a; });

}
function loop(){ if(sim && sim.alpha>0.02 && !reduceMotion){ tick(); draw(); requestAnimationFrame(loop); } else { draw(); } }
function nodeRadius(i){ return 6+Math.min(9, Math.sqrt(N[i].fin)*2.1); }
function scl(){ return Math.max(0.7,Math.min(1.4,view.scale)); }
function toScreen(p){ return {x:(p.x+view.x)*view.scale, y:(p.y+view.y)*view.scale}; }
function fromScreen(x,y){ return {x:x/view.scale-view.x, y:y/view.scale-view.y}; }
function fitView(){
  if(!sim) return;
  var ns=sim.nodes, keys=Object.keys(ns), minx=1e9,miny=1e9,maxx=-1e9,maxy=-1e9;
  keys.forEach(function(k){ var A=ns[k]; minx=Math.min(minx,A.x);miny=Math.min(miny,A.y);maxx=Math.max(maxx,A.x);maxy=Math.max(maxy,A.y); });
  var r=stage.getBoundingClientRect(), pad=70, w=Math.max(1,maxx-minx), h=Math.max(1,maxy-miny);

  view.scale=s; view.x=(r.width/2)/s-(minx+maxx)/2; view.y=(r.height/2)/s-(miny+maxy)/2; draw();
}
function draw(){
  ctx.setTransform(DPR,0,0,DPR,0,0);
  var r=stage.getBoundingClientRect(); ctx.clearRect(0,0,r.width,r.height);
  if(!sim) return;
  var ns=sim.nodes, accent=cssVar("--accent"), line=cssVar("--line"), ink=cssVar("--ink"), muted=cssVar("--muted");
  sim.nb.links.forEach(function(l){
    var A=ns[l.s], B=ns[l.t]; if(!A||!B) return;
    var a=toScreen(A), b=toScreen(B), hot=(l.s===sim.root||l.t===sim.root);
    ctx.strokeStyle=hot?accent:line; ctx.globalAlpha=hot?0.85:0.5; ctx.lineWidth=hot?1.6:1;
    ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke();
    var dx=b.x-a.x, dy=b.y-a.y, d=Math.sqrt(dx*dx+dy*dy)||1, rB=nodeRadius(l.t)*view.scale+2;
    var hx=b.x-dx/d*rB, hy=b.y-dy/d*rB, ang=Math.atan2(dy,dx);
    ctx.globalAlpha=hot?0.9:0.55; ctx.beginPath(); ctx.moveTo(hx,hy);
    ctx.lineTo(hx-Math.cos(ang-0.4)*6, hy-Math.sin(ang-0.4)*6); ctx.lineTo(hx-Math.cos(ang+0.4)*6, hy-Math.sin(ang+0.4)*6);
    ctx.closePath(); ctx.fillStyle=hot?accent:muted; ctx.fill();
  });
  ctx.globalAlpha=1;
  Object.keys(ns).forEach(function(k){
    var A=ns[k], i=A.i, p=toScreen(A), rad=nodeRadius(i)*scl(), isRoot=i===sim.root, isHover=hoverNode&&hoverNode.i===i;
    ctx.beginPath(); ctx.arc(p.x,p.y,rad,0,6.2832); ctx.fillStyle=langVar(N[i].l); ctx.fill();
    if(N[i].hub){ ctx.lineWidth=2; ctx.strokeStyle=cssVar("--hub"); ctx.stroke(); }
    if(isRoot||isHover){ ctx.lineWidth=isRoot?3:2; ctx.strokeStyle=accent; ctx.stroke(); }
    if(view.scale>0.5||isRoot||isHover){
      ctx.font=(isRoot?"600 ":"")+"11px "+cssVar("--mono"); ctx.fillStyle=ink; ctx.textAlign="center"; ctx.textBaseline="top";
      ctx.globalAlpha=isRoot||isHover?1:0.85; ctx.fillText(basename(N[i].p), p.x, p.y+rad+3); ctx.globalAlpha=1;
    }
  });
}
function pick(mx,my){
  if(!sim) return null;
  var ns=sim.nodes, best=null, bestd=1e9;
  Object.keys(ns).forEach(function(k){ var A=ns[k], p=toScreen(A), rad=nodeRadius(A.i)*scl()+4, d=Math.hypot(mx-p.x,my-p.y); if(d<rad&&d<bestd){bestd=d;best=A;} });
  return best;
}
function evtPos(e){ var r=canvas.getBoundingClientRect(); return {x:e.clientX-r.left, y:e.clientY-r.top}; }
canvas.addEventListener("pointerdown",function(e){
  var m=evtPos(e), hit=pick(m.x,m.y); canvas.setPointerCapture(e.pointerId);
  if(hit){ dragNode=hit; dragNode._moved=false; } else { panning=true; last=m; }
});
canvas.addEventListener("pointermove",function(e){
  var m=evtPos(e);
  if(dragNode){ var w=fromScreen(m.x,m.y); dragNode.x=w.x; dragNode.y=w.y; dragNode.vx=0; dragNode.vy=0; dragNode._moved=true;
    if(sim) sim.alpha=Math.max(sim.alpha,0.4); if(reduceMotion) draw(); else loop(); return; }
  if(panning){ view.x+=(m.x-last.x)/view.scale; view.y+=(m.y-last.y)/view.scale; last=m; draw(); return; }
  var hit=pick(m.x,m.y);
  if(hit!==hoverNode){
    hoverNode=hit; draw();
    if(hit){ var p=toScreen(hit); tooltip.style.left=p.x+"px"; tooltip.style.top=p.y+"px"; tooltip.textContent=N[hit.i].p; tooltip.style.opacity="1"; canvas.style.cursor="pointer"; }
    else { tooltip.style.opacity="0"; canvas.style.cursor="default"; }
  } else if(hit){ var q=toScreen(hit); tooltip.style.left=q.x+"px"; tooltip.style.top=q.y+"px"; }
});
canvas.addEventListener("pointerup",function(){ if(dragNode){ if(!dragNode._moved) select(dragNode.i,false); dragNode=null; } panning=false; });
canvas.addEventListener("wheel",function(e){
  e.preventDefault(); var m=evtPos(e), before=fromScreen(m.x,m.y);
  view.scale=Math.max(0.2,Math.min(3, view.scale*(e.deltaY<0?1.12:0.89)));
  var after=fromScreen(m.x,m.y); view.x+=after.x-before.x; view.y+=after.y-before.y; draw();
},{passive:false});
document.getElementById("depth1").onclick=function(){ setDepth(1); };
document.getElementById("depth2").onclick=function(){ setDepth(2); };
document.getElementById("fit").onclick=fitView;
function setDepth(d){
  depth=d; document.getElementById("depth1").setAttribute("aria-pressed",d===1?"true":"false");
  document.getElementById("depth2").setAttribute("aria-pressed",d===2?"true":"false");
  if(selected>=0){ buildSim(selected); loop(); }
}
document.getElementById("legend").innerHTML='<div class="row"><b>legend</b></div>'+
  langs.map(function(l){return '<div class="row"><span class="dot" style="background:'+langVar(l)+'"></span>'+esc(l)+'</div>';}).join("")+
  '<div class="row"><span class="dot" style="background:transparent;border:2px solid '+cssVar("--hub")+'"></span>hub (fan-in &ge; '+S.hubThreshold+')</div>'+
  '<div class="row muted">arrow: importer &rarr; imported</div>';
function expandAncestors(i){
  var parts=N[i].p.split("/"), p="";
  for(var d=0; d<parts.length-1; d++){ p=(p?p+"/":"")+parts[d]; collapsed.delete(p); }
}
function select(i,scrollList){
  selected=i; document.getElementById("stageEmpty").style.display="none";
  if(viewMode==="tree") expandAncestors(i);
  renderList(); renderInspector(); buildSim(i); loop();
  if(scrollList){ var sel=listEl.querySelector('[aria-selected="true"]'); if(sel) sel.scrollIntoView({block:"nearest"}); }
}
new MutationObserver(function(){ draw(); }).observe(document.documentElement,{attributes:true,attributeFilter:["data-theme"]});
renderList(); resize();
if(order.length){ select(order[0],true); }
})();
</script>
