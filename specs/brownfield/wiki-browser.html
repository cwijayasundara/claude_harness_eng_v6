<script>
(function(){
"use strict";
var MODEL = JSON.parse(document.getElementById("wiki-data").textContent);
var byId = {}; MODEL.pages.forEach(function(p){ byId[p.id]=p; });
var current=null;
function esc(s){ return String(s).replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c];}); }
function cssVar(n){ return getComputedStyle(document.documentElement).getPropertyValue(n).trim(); }

document.getElementById("repo").textContent = MODEL.repo;
var g=MODEL.stats.groups||{};
document.getElementById("metrics").innerHTML =
  chip(MODEL.stats.pages,"pages")+chip(g.pages||0,"clusters")+chip(g.concepts||0,"concepts");
function chip(v,l){ return '<div class="chip"><b class="tnum">'+v+'</b><span>'+l+'</span></div>'; }

var GROUPS=[["overview","Overview"],["pages","Clusters"],["concepts","Concepts"],["other","Other"]];
var idxEl=document.getElementById("index"), searchEl=document.getElementById("search");
searchEl.addEventListener("input", renderIndex);
function matches(p,q){ return !q || p.title.toLowerCase().indexOf(q)>=0 || p.text.indexOf(q)>=0; }
function renderIndex(){
  var q=searchEl.value.trim().toLowerCase(), frag=document.createDocumentFragment(), shown=0;
  GROUPS.forEach(function(gr){
    var list=MODEL.pages.filter(function(p){ return p.group===gr[0] && matches(p,q); });
    if(!list.length) return;
    var lab=document.createElement("div"); lab.className="grp-label";
    lab.innerHTML='<span class="dot" style="background:'+cssVar("--grp-"+gr[0])+'"></span>'+gr[1]+' <span class="tnum" style="margin-left:auto">'+list.length+'</span>';
    frag.appendChild(lab);
    list.forEach(function(p){ shown++; frag.appendChild(idxRow(p)); });
  });
  idxEl.innerHTML=""; idxEl.appendChild(frag);
  document.getElementById("pagecount").textContent = shown+" / "+MODEL.pages.length;
}
function idxRow(p){
  var b=document.createElement("button"); b.className="idx"; b.setAttribute("aria-current",p.id===current?"true":"false");
  b.innerHTML='<span class="t">'+esc(p.title)+'</span>'+(p.backlinks.length?'<span class="bl" title="referenced by">&larr;'+p.backlinks.length+'</span>':'');
  b.onclick=function(){ go(p.id,true); }; return b;
}

var articleEl=document.getElementById("article"), refsEl=document.getElementById("refs");
function reflink(id){ var p=byId[id]; return '<button class="reflink" data-nav="'+esc(id)+'" title="'+esc(id)+'">'+esc(p?p.title:id)+'</button>'; }
function renderRefs(p){
  var h='';
  h+='<div class="sec"><h3>Referenced by <span class="n tnum">'+p.backlinks.length+'</span></h3>';
  h+= p.backlinks.length ? p.backlinks.map(reflink).join("") : '<span class="muted">Nothing links here.</span>';
  h+='</div>';
  var outIds=p.links.filter(function(id){return id!==p.id;});
  h+='<div class="sec"><h3>Links to <span class="n tnum">'+outIds.length+'</span></h3>';
  h+= outIds.length ? outIds.map(reflink).join("") : '<span class="muted">No outgoing links.</span>';
  h+='</div>';
  refsEl.innerHTML=h;
  Array.prototype.forEach.call(refsEl.querySelectorAll("[data-nav]"),function(el){ el.onclick=function(){ go(el.dataset.nav,true); }; });
}
function wireContentLinks(){
  Array.prototype.forEach.call(articleEl.querySelectorAll("a.wl[data-nav]"),function(a){
    a.onclick=function(e){ e.preventDefault(); go(a.dataset.nav,true); };
  });
}
function go(id,push){
  if(!byId[id]) return;
  current=id; var p=byId[id];
  articleEl.innerHTML=p.html; wireContentLinks(); renderRefs(p);
  Array.prototype.forEach.call(idxEl.querySelectorAll(".idx"),function(el){ el.setAttribute("aria-current","false"); });
  renderIndex();
  var sel=idxEl.querySelector('[aria-current="true"]'); if(sel) sel.scrollIntoView({block:"nearest"});
  articleEl.parentElement.scrollTop=0;
  if(push && location.hash!=="#/"+id) location.hash="#/"+id;
}
window.addEventListener("hashchange",function(){ var id=decodeURIComponent(location.hash.replace(/^#\//,"")); if(byId[id]) go(id,false); });

renderIndex();
var start=decodeURIComponent(location.hash.replace(/^#\//,""));
go(byId[start]?start:MODEL.home, false);
})();
</script>
